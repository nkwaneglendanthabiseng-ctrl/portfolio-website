<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Home</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <a href="index.html" class="logo">Portfolio</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">Projects</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
        <div class="menu-toggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Hello, I'm <span>Nkwane Glenda Nthabiseng</span></h1>
            <p>A passionate developer creating amazing digital experiences. I turn ideas into elegant, functional solutions.</p>
            <a href="about.html" class="btn">View My Work</a>
        </div>
        <div class="hero-image">
            <!-- Profile Picture -->
            <img src="IMG-20260308-WA0005.jpg" alt="Glender Nkoane Profile Picture">
        </div>
    </section>

    <!-- Footer with Navigation -->
    <footer>
        <div class="footer-nav">
            <a href="index.html">Home</a>
            <a href="about.html">Projects</a>
            <a href="contact.html">Contact</a>
        </div>
        <p>&copy; 2024 Portfolio. All rights reserved.</p>
    </footer>

    <!-- Mobile Menu Script -->
    <script>
        const menuToggle = document.querySelector('.menu-toggle');
        const navLinks = document.querySelector('.nav-links');

        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        // Close menu when clicking a link
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
            });
        });
    </script>
</body>
</html>
